services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: ims
      POSTGRES_PASSWORD: ims
      POSTGRES_DB: ims_workspace
    ports:
      - "5432:5432"
    volumes:
      - ims_pgdata:/var/lib/postgresql/data
  api:
    build: .
    depends_on:
      - db
    environment:
      DATABASE_URL: postgres://ims:ims@db:5432/ims_workspace
      IMS_BIND_ADDR: 0.0.0.0:8080
      IMS_JWT_SECRET: change-me-in-production
      RUST_LOG: info,sqlx=warn,tower_http=info
    ports:
      - "8080:8080"
volumes:
  ims_pgdata:
