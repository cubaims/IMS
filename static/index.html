<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IMS Workspace 管理后台交互原型</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --panel: #ffffff;
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --text: #172033;
      --muted: #64748b;
      --border: #e2e8f0;
      --success: #16a34a;
      --warning: #d97706;
      --danger: #dc2626;
      --info: #0891b2;
      --shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
      --radius: 14px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 260px 1fr;
    }

    .sidebar {
      background: #0f172a;
      color: #e5e7eb;
      padding: 18px 14px;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow-y: auto;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 10px 18px;
      border-bottom: 1px solid rgba(255,255,255,0.12);
      margin-bottom: 12px;
    }

    .brand-logo {
      width: 38px;
      height: 38px;
      border-radius: 12px;
      background: linear-gradient(135deg, #2563eb, #22c55e);
      display: grid;
      place-items: center;
      font-weight: 800;
    }

    .brand small { color: #94a3b8; display: block; margin-top: 3px; }

    .nav-section-title {
      font-size: 12px;
      color: #94a3b8;
      padding: 16px 10px 8px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .nav-item {
      width: 100%;
      border: 0;
      background: transparent;
      color: #cbd5e1;
      text-align: left;
      padding: 10px 12px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .nav-item:hover { background: rgba(255,255,255,0.08); color: #fff; }
    .nav-item.active { background: var(--primary); color: #fff; }
    .nav-item .badge { font-size: 11px; color: #cbd5e1; }

    .main {
      min-width: 0;
      padding: 20px 24px 40px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-bottom: 20px;
    }

    .topbar h1 {
      margin: 0;
      font-size: 24px;
    }

    .topbar p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 14px;
    }

    .top-actions {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .search-global {
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 10px 14px;
      min-width: 260px;
      outline: none;
    }

    .btn {
      border: 0;
      border-radius: 10px;
      padding: 10px 14px;
      cursor: pointer;
      font-weight: 600;
      background: #e2e8f0;
      color: #0f172a;
    }

    .btn.primary { background: var(--primary); color: #fff; }
    .btn.primary:hover { background: var(--primary-dark); }
    .btn.success { background: var(--success); color: #fff; }
    .btn.warning { background: var(--warning); color: #fff; }
    .btn.danger { background: var(--danger); color: #fff; }
    .btn.ghost { background: transparent; border: 1px solid var(--border); }
    .btn.small { padding: 7px 10px; font-size: 12px; }

    .grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 16px;
      margin-bottom: 18px;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 16px;
    }

    .metric .label { color: var(--muted); font-size: 13px; }
    .metric .value { font-size: 28px; font-weight: 800; margin-top: 8px; }
    .metric .trend { font-size: 12px; margin-top: 8px; color: var(--success); }

    .toolbar {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 12px;
      display: flex;
      gap: 10px;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    .toolbar-left, .toolbar-right { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }

    input, select, textarea {
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 9px 10px;
      outline: none;
      background: #fff;
      min-height: 38px;
    }

    textarea { resize: vertical; min-height: 80px; }

    table {
      width: 100%;
      border-collapse: collapse;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow);
    }

    th, td {
      padding: 12px 14px;
      border-bottom: 1px solid var(--border);
      text-align: left;
      font-size: 13px;
      vertical-align: middle;
    }

    th {
      background: #f8fafc;
      color: #334155;
      font-size: 12px;
      letter-spacing: 0.02em;
      text-transform: uppercase;
    }

    tr:hover td { background: #f8fafc; }

    .status {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 4px 9px;
      font-size: 12px;
      font-weight: 700;
    }

    .status.green { background: #dcfce7; color: #166534; }
    .status.blue { background: #dbeafe; color: #1e40af; }
    .status.yellow { background: #fef3c7; color: #92400e; }
    .status.red { background: #fee2e2; color: #991b1b; }
    .status.gray { background: #e5e7eb; color: #374151; }

    .panel-title {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .panel-title h2 { margin: 0; font-size: 18px; }

    .split {
      display: grid;
      grid-template-columns: 1.2fr 0.8fr;
      gap: 16px;
    }

    .timeline {
      display: grid;
      gap: 10px;
    }

    .timeline-item {
      border-left: 3px solid var(--primary);
      padding: 8px 10px;
      background: #f8fafc;
      border-radius: 10px;
    }

    .timeline-item strong { display: block; font-size: 13px; }
    .timeline-item span { color: var(--muted); font-size: 12px; }

    .modal-mask {
      position: fixed;
      inset: 0;
      background: rgba(15,23,42,0.55);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      padding: 20px;
    }

    .modal-mask.show { display: flex; }

    .modal {
      width: min(760px, 100%);
      max-height: 88vh;
      overflow-y: auto;
      background: var(--panel);
      border-radius: 18px;
      box-shadow: 0 30px 80px rgba(0,0,0,0.25);
      padding: 20px;
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
    }

    .modal-header h3 { margin: 0; }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .form-field label {
      display: block;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .form-field input, .form-field select, .form-field textarea { width: 100%; }

    .form-field.full { grid-column: 1 / -1; }

    .modal-footer {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 16px;
    }

    .toast {
      position: fixed;
      right: 24px;
      bottom: 24px;
      background: #0f172a;
      color: #fff;
      padding: 12px 16px;
      border-radius: 12px;
      display: none;
      box-shadow: var(--shadow);
      z-index: 1100;
    }

    .toast.show { display: block; }

    .empty {
      padding: 40px;
      text-align: center;
      color: var(--muted);
      background: var(--panel);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
    }

    @media (max-width: 1100px) {
      .app { grid-template-columns: 1fr; }
      .sidebar { position: static; height: auto; }
      .grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .split { grid-template-columns: 1fr; }
    }

    @media (max-width: 720px) {
      .main { padding: 14px; }
      .topbar { flex-direction: column; align-items: flex-start; }
      .top-actions { width: 100%; flex-wrap: wrap; }
      .search-global { min-width: 100%; }
      .grid { grid-template-columns: 1fr; }
      .form-grid { grid-template-columns: 1fr; }
      table { display: block; overflow-x: auto; white-space: nowrap; }
    }
  </style>
</head>

  <script>
    // ==================== API 配置 ====================
    const API_BASE_URL = window.location.origin;
    
    // ==================== 认证管理 ====================
    let authToken = localStorage.getItem('authToken');
    let currentUser = null;

    async function apiCall(endpoint, options = {}) {
      const headers = {
        'Content-Type': 'application/json',
        ...options.headers
      };
      
      if (authToken) {
        headers['Authorization'] = `Bearer ${authToken}`;
      } else {
        console.error('No authToken available!');
      }

      console.log('API Call:', endpoint, 'Token:', authToken ? authToken.substring(0, 20) + '...' : 'null');

      const response = await fetch(`${API_BASE_URL}${endpoint}`, {
        ...options,
        headers
      });

      // 401 未授权 或 403 禁止访问 都应该重新登录
      if (response.status === 401 || response.status === 403) {
        logout();
        throw new Error('登录已过期，请重新登录');
      }

      const data = await response.json();
      
      if (!response.ok) {
        throw new Error(data.message || data.error_code || '请求失败');
      }

      return data;
    }

    async function login(username, password) {
      try {
        const response = await apiCall('/api/auth/login', {
          method: 'POST',
          body: JSON.stringify({ username, password })
        });

        if (response.success && response.data) {
          authToken = response.data.access_token;
          currentUser = response.data.user;
          localStorage.setItem('authToken', authToken);
          localStorage.setItem('currentUser', JSON.stringify(currentUser));
          showMainApp();
          showToast(`欢迎回来，${currentUser.display_name || currentUser.username}！`);
        } else {
          throw new Error(response.message || '登录失败');
        }
      } catch (error) {
        showToast(`登录失败: ${error.message}`);
        console.error('Login error:', error);
      }
    }

    function logout() {
      authToken = null;
      currentUser = null;
      localStorage.removeItem('authToken');
      localStorage.removeItem('currentUser');
      showLoginPage();
    }

    function showLoginPage() {
      document.body.innerHTML = `
        <div style="min-height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--bg);">
          <div class="card" style="width: min(420px, 90%); padding: 32px;">
            <div style="text-align: center; margin-bottom: 24px;">
              <div class="brand-logo" style="width: 56px; height: 56px; margin: 0 auto 12px; font-size: 24px;">IMS</div>
              <h2 style="margin: 0 0 8px;">IMS Workspace</h2>
              <p style="color: var(--muted); margin: 0;">出入库管理系统</p>
            </div>
            <form id="loginForm" onsubmit="handleLogin(event)">
              <div class="form-field" style="margin-bottom: 16px;">
                <label>用户名</label>
                <input id="username" type="text" placeholder="请输入用户名" required autofocus />
              </div>
              <div class="form-field" style="margin-bottom: 20px;">
                <label>密码</label>
                <input id="password" type="password" placeholder="请输入密码" required />
              </div>
              <button type="submit" class="btn primary" style="width: 100%;">登录</button>
            </form>
            <div style="margin-top: 16px; text-align: center; font-size: 13px; color: var(--muted);">
              默认账号: admin / admin123
            </div>
          </div>
        </div>
        <div class="toast" id="toast">操作成功</div>
      `;
    }

    function handleLogin(event) {
      event.preventDefault();
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      login(username, password);
    }

    function showMainApp() {
      document.body.innerHTML = `
  <div class="app">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-logo">IMS</div>
        <div>

      <div class="nav-section-title">主数据</div>

      <div class="nav-section-title">库存与追溯</div>

    </aside>

    <main class="main">
      <div class="topbar">
        <div>
          <h1 id="pageTitle">首页仪表盘</h1>
          <p id="pageDesc">库存、入库、出库、低库存和质量状态总览。</p>
        </div>
        <div class="top-actions">
          <input class="search-global" id="globalSearch" placeholder="全局搜索：物料 / 批次 / 单据 / 用户" />
          <button class="btn ghost" onclick="refreshPage()">刷新</button>
          <button class="btn primary" onclick="openModal('快速操作', 'quick')">快速操作</button>

  <div class="modal-mask" id="modalMask">
    <div class="modal">
      <div class="modal-header">
        <h3 id="modalTitle">操作</h3>
        <button class="btn ghost small" onclick="closeModal()">关闭</button>
      </div>
      <div id="modalBody"></div>
      <div class="modal-footer">
        <button class="btn ghost" onclick="closeModal()">取消</button>
        <button class="btn primary" onclick="submitModal()">确认</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast">操作成功</div>
      `;
      
      // 重新绑定事件监听器
      document.querySelectorAll('.nav-item').forEach(item => {
        item.addEventListener('click', () => {
          document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
          item.classList.add('active');
          renderPage(item.dataset.page);
        });
      });

      document.getElementById('globalSearch').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') showToast(`搜索：${e.target.value}`);
      });

      renderPage('dashboard');
    }

    // ==================== 物料主数据 API ====================
    let materialsCache = { items: [], page: 1, page_size: 20 };
    let materialsFilters = { keyword: '', page: 1 };

    async function loadMaterials(page = 1, keyword = '') {
      try {
        const params = new URLSearchParams({
          page: page.toString(),
          page_size: '20'
        });
        if (keyword) params.append('keyword', keyword);
        
        const response = await apiCall(`/api/master-data/materials?${params}`);
        if (response.success && response.data) {
          materialsCache = response.data;
          return response.data;
        }
        return { items: [], page: 1, page_size: 20 };
      } catch (error) {
        showToast(`加载物料失败: ${error.message}`);
        return { items: [], page: 1, page_size: 20 };
      }
    }

    async function getMaterial(materialId) {
      try {
        const response = await apiCall(`/api/master-data/materials/${materialId}`);
        return response.data;
      } catch (error) {
        showToast(`加载物料详情失败: ${error.message}`);
        return null;
      }
    }

    async function createMaterial(formData) {
      try {
        const response = await apiCall('/api/master-data/materials', {
          method: 'POST',
          body: JSON.stringify(formData)
        });
        showToast('物料创建成功');
        return response.data;
      } catch (error) {
        showToast(`创建失败: ${error.message}`);
        throw error;
      }
    }

    async function updateMaterial(materialId, formData) {
      try {
        const response = await apiCall(`/api/master-data/materials/${materialId}`, {
          method: 'PATCH',
          body: JSON.stringify(formData)
        });
        showToast('物料更新成功');
        return response.data;
      } catch (error) {
        showToast(`更新失败: ${error.message}`);
        throw error;
      }
    }

    async function renderMaterialsPage() {
      const data = await loadMaterials(materialsFilters.page, materialsFilters.keyword);
      
      const rows = data.items.map(m => [
        m.material_id,
        m.material_name,
        m.material_type || '-',
        m.base_unit || 'PCS',
        m.current_stock || 0,
        m.safety_stock || 0,
        m.status || '正常'
      ]);

      const toolbar = `
        <div class="toolbar">
          <div class="toolbar-left">
            <input id="materialSearch" placeholder="搜索物料编码或名称" value="${materialsFilters.keyword}" />
            <button class="btn ghost" onclick="searchMaterials()">搜索</button>
          </div>
          <div class="toolbar-right">
            <button class="btn ghost" onclick="exportCsv()">导出 CSV</button>
            <button class="btn primary" onclick="openMaterialModal('create')">新增物料</button>
          </div>
        </div>
      `;

      const pagination = `
        <div style="display: flex; justify-content: center; align-items: center; gap: 10px; margin-top: 16px;">
          <button class="btn ghost small" onclick="goToMaterialPage(${data.page - 1})" ${data.page === 1 ? 'disabled' : ''}>上一页</button>
          <span>第 ${data.page} 页</span>
          <button class="btn ghost small" onclick="goToMaterialPage(${data.page + 1})" ${data.items.length < data.page_size ? 'disabled' : ''}>下一页</button>
        </div>
      `;

      return toolbar + renderTable(
        ['物料编码','物料名称','类型','单位','当前库存','安全库存','状态'],
        rows,
        true,
        'material'
      ) + pagination;
    }

    function searchMaterials() {
      const keyword = document.getElementById('materialSearch')?.value || '';
      materialsFilters.keyword = keyword;
      materialsFilters.page = 1;
      renderPage('materials');
    }

    function goToMaterialPage(page) {
      if (page < 1) return;
      materialsFilters.page = page;
      renderPage('materials');

      const formData = {

    function statusClass(value) {
      if (['合格','OPEN','RECEIVED','SHIPPED','COMPLETED','ACTIVE','正常','一致'].includes(value)) return 'green';

    function renderTable(headers, rows, actions = true, entityType = 'generic') {

          <button class="btn small primary" onclick="showToast('操作已提交')">处理</button>

      };

      const getActionButtons = actionButtons[entityType] || actionButtons.generic;

      return `
        <table id="dataTable">
          <thead><tr>${headers.map(h => `<th>${h}</th>`).join('')}${actions ? '<th>操作</th>' : ''}</tr></thead>
          <tbody>

                ${actions ? `<td>${getActionButtons(row)}</td>` : ''}
              </tr>
            `).join('')}
          </tbody>
        </table>
      `;
    }

    }

    function mrpRunPage() {
      return `
        <div class="card">
          <div class="panel-title"><h2>运行 MRP</h2></div>
          <div class="form-grid">
            <div class="form-field"><label>产品变体</label><input value="FIN-A001" /></div>
            <div class="form-field"><label>成品物料</label><input value="FIN001" /></div>
            <div class="form-field"><label>需求数量</label><input type="number" value="100" /></div>
            <div class="form-field"><label>需求日期</label><input type="date" value="2026-05-20" /></div>
            <div class="form-field full"><label>备注</label><textarea>MRP demand for customer order</textarea></div>
          </div>
          <div class="modal-footer"><button class="btn primary" onclick="showToast('MRP 已运行，生成 5 条建议')">运行 MRP</button></div>
        </div>
        <br />
        ${renderTable(['运行号','变体','需求数量','建议数','短缺数','状态'], [
          ['MRP-20260504-0001','FIN-A001','100','5','3','COMPLETED'],
          ['MRP-20260504-0002','FIN-B001','50','2','1','COMPLETED']
        ])}

    }

    function reportsPage(kind) {
      const rows = {
        inventoryReports: [['RM001','RM-A01','BATCH-RM001-001','合格','1,000'], ['FIN001','FG-A01','BATCH-FIN001-001','合格','86']],
        lowStock: [['TP001','Touch Panel','18','50','LOW'], ['CG001','Cover Glass','8','30','LOW']],
        consistency: [['RM001','1,280','1,280','1,280','一致'], ['FIN001','86','86','86','一致']]
      };
      const headers = kind === 'consistency' ? ['物料','物料库存','货位库存','批次库存','状态'] : kind === 'lowStock' ? ['物料','名称','当前库存','安全库存','状态'] : ['物料','货位','批次','质量状态','数量'];
      return `
        <div class="toolbar">
          <div class="toolbar-left">
            <input placeholder="筛选物料 / 批次 / 货位" />
            <select><option>全部</option><option>仅异常</option><option>仅低库存</option></select>
          </div>
          <div class="toolbar-right">
            <button class="btn ghost" onclick="showToast('8 个物化视图刷新完成')">刷新物化视图</button>
            <button class="btn primary" onclick="exportCsv()">导出 CSV</button>
          </div>
        </div>
        ${renderTable(headers, rows[kind], false)}
      `;
    }

    function tracePage(type) {
      return `
        <div class="toolbar">
          <div class="toolbar-left"><input placeholder="输入${type === 'batch' ? '批次号' : '序列号'}" value="${type === 'batch' ? 'BATCH-FIN001-001' : 'SN-FIN001-0001'}" /></div>
          <div class="toolbar-right"><button class="btn primary" onclick="showToast('追溯查询完成')">开始追溯</button></div>
        </div>
        <div class="split">
          <div class="card">
            <h2>${type === 'batch' ? '正向追溯' : '序列号流转'}</h2>
            <div class="timeline">
              <div class="timeline-item"><strong>原料入库</strong><span>101 / RM001 / BATCH-RM001-001</span></div>
              <div class="timeline-item"><strong>生产领料</strong><span>261 / MO-20260504-0001</span></div>
              <div class="timeline-item"><strong>成品入库</strong><span>101 / FIN001 / BATCH-FIN001-001</span></div>
              <div class="timeline-item"><strong>销售出库</strong><span>261 / SO-20260504-0001</span></div>
            </div>

          <div class="card">
            <h2>${type === 'batch' ? '反向追溯' : '绑定信息'}</h2>
            ${renderTable(['节点','物料','批次/序列号','数量','单据'], [
              ['成品','FIN001','BATCH-FIN001-001','10','MO-20260504-0001'],
              ['组件','TP001','BATCH-TP001-001','10','TRX-0007'],
              ['原料','RM001','BATCH-RM001-001','10','TRX-0001']
            ], false)}
          </div>
        </div>
      `;
    }

    async function renderPage(page) {
      document.getElementById('pageTitle').textContent = pageMeta[page][0];
      document.getElementById('pageDesc').textContent = pageMeta[page][1];

      const content = document.getElementById('content');
      
      // 物料主数据使用真实 API
      if (page === 'materials') {
        content.innerHTML = '<div style="padding: 40px; text-align: center;">加载中...</div>';
        content.innerHTML = await renderMaterialsPage();
      }
      else if (page === 'dashboard') content.innerHTML = dashboard();
      else if (['bins','suppliers','customers','bom'].includes(page)) content.innerHTML = simpleMasterPage(page);
      else if (page === 'purchaseOrders') content.innerHTML = toolbar('新建采购订单', 'purchaseOrder') + renderTable(['PO 编号','供应商','物料','数量','状态'], samples.orders);
      else if (page === 'purchaseReceipt') content.innerHTML = purchaseReceiptPage();
      else if (page === 'salesOrders') content.innerHTML = toolbar('新建销售订单', 'salesOrder') + renderTable(['SO 编号','客户','物料','数量','状态'], samples.sales);
      else if (page === 'salesShipment') content.innerHTML = salesShipmentPage();
      else if (page === 'productionOrders') content.innerHTML = toolbar('新建生产订单', 'productionOrder') + renderTable(['生产订单','变体','成品','计划数量','状态'], [['MO-20260504-0001','FIN-A001','FIN001','100','RELEASED'], ['MO-20260504-0002','FIN-B001','FIN001','50','PLANNED']]);
      else if (page === 'productionComplete') content.innerHTML = productionCompletePage();
      else if (page === 'inventoryCurrent') content.innerHTML = toolbar('手工过账', 'inventoryPost') + renderTable(['物料','货位','批次','质量状态','数量'], samples.stock);
      else if (page === 'inventoryLedger') content.innerHTML = toolbar('新增过账', 'inventoryPost') + renderTable(['事务号','移动类型','物料','数量','来源货位','目标货位','批次'], [['TRX-0001','101','RM001','100', '-', 'RM-A01','BATCH-RM001-001'], ['TRX-0002','261','RM001','20','RM-A01','-', 'BATCH-RM001-001'], ['TRX-0003','311','RM001','30','RM-A01','RM-A02','BATCH-RM001-001']]);
      else if (page === 'binStock') content.innerHTML = reportsPage('inventoryReports');
      else if (page === 'batchStock') content.innerHTML = toolbar('批次操作', 'batchAction') + renderTable(['批次','物料','库存','质量状态','过期日期'], samples.batches);
      else if (page === 'batchTrace') content.innerHTML = tracePage('batch');
      else if (page === 'serialTrace') content.innerHTML = tracePage('serial');
      else if (page === 'qualityInspection') content.innerHTML = qualityInspectionPage();
      else if (page === 'qualityNotification') content.innerHTML = toolbar('创建质量通知', 'qualityNotification') + renderTable(['通知单','来源','物料','批次','严重等级','状态'], [['QN-0001','INSPECTION','RM001','BATCH-RM001-002','HIGH','OPEN'], ['QN-0002','MANUAL','FIN001','BATCH-FIN001-001','LOW','CLOSED']]);
      else if (page === 'inventoryCount') content.innerHTML = inventoryCountPage();
      else if (page === 'mrpRun') content.innerHTML = mrpRunPage();
      else if (page === 'mrpSuggestions') content.innerHTML = toolbar('确认建议', 'mrpSuggestion') + renderTable(['建议号','运行号','物料','类型','净需求','建议数量','状态'], [['MRPS-0001','MRP-0001','RM001','PURCHASE','70','70','OPEN'], ['MRPS-0002','MRP-0001','TP001','PRODUCTION','20','20','OPEN']]);
      else if (['inventoryReports','lowStock','consistency'].includes(page)) content.innerHTML = reportsPage(page);
      else if (page === 'users') content.innerHTML = toolbar('新增用户', 'user') + renderTable(['用户','姓名','邮箱','角色','状态'], [['admin','系统管理员','admin@ims.local','ADMIN','ACTIVE'], ['operator','仓库操作员','op@ims.local','WAREHOUSE_OPERATOR','ACTIVE']]);
      else if (page === 'roles') content.innerHTML = toolbar('新增角色', 'role') + renderTable(['角色','名称','权限数','状态'], [['ADMIN','系统管理员','24','ACTIVE'], ['AUDITOR','审计员','6','ACTIVE']]);
      else if (page === 'audit') content.innerHTML = toolbar('导出审计日志', 'audit') + renderTable(['时间','用户','动作','对象','结果'], [['2026-05-04 10:01','admin','AUTH_LOGIN_SUCCESS','USER','正常'], ['2026-05-04 10:20','operator','POST_101','TRX-0001','正常'], ['2026-05-04 11:02','qa','FREEZE_BATCH','BATCH-RM001-002','正常']]);
      else if (page === 'params') content.innerHTML = toolbar('新增参数', 'param') + renderTable(['参数键','参数值','说明','状态'], [['JWT_EXPIRES_SECONDS','86400','Token 有效期','ACTIVE'], ['ALLOW_EXPIRED_BATCH_OUT','false','是否允许过期批次出库','ACTIVE']]);
      else content.innerHTML = '<div class="empty">页面建设中</div>';
    }

    function modalForm(type) {
      const commonFields = `

        <div class="form-field"><label>名称</label><input placeholder="请输入名称" /></div>
        <div class="form-field"><label>状态</label><select><option>ACTIVE</option><option>INACTIVE</option></select></div>
        <div class="form-field full"><label>备注</label><textarea placeholder="请输入备注"></textarea></div>
      `;
      const forms = {
        material: `
          <div class="form-grid">
            <div class="form-field"><label>物料编码</label><input value="RM001" /></div>
            <div class="form-field"><label>物料名称</label><input value="Raw Material A" /></div>
            <div class="form-field"><label>物料类型</label><select><option>RAW</option><option>SEMI</option><option>FIN</option></select></div>
            <div class="form-field"><label>基础单位</label><input value="PCS" /></div>
            <div class="form-field"><label>安全库存</label><input type="number" value="100" /></div>
            <div class="form-field"><label>标准成本</label><input type="number" value="12.5" /></div>
          </div>`,
        bin: `<div class="form-grid"><div class="form-field"><label>货位编码</label><input value="RM-A01" /></div><div class="form-field"><label>区域</label><select><option>RM</option><option>SF</option><option>FG</option><option>QC</option></select></div><div class="form-field"><label>容量</label><input type="number" value="10000" /></div><div class="form-field"><label>类型</label><select><option>NORMAL</option><option>HOLD</option><option>SCRAP</option></select></div></div>`,
        purchaseOrder: `<div class="form-grid"><div class="form-field"><label>供应商</label><input value="SUP001" /></div><div class="form-field"><label>预计到货日期</label><input type="date" value="2026-05-15" /></div><div class="form-field"><label>物料</label><input value="RM001" /></div><div class="form-field"><label>采购数量</label><input type="number" value="100" /></div><div class="form-field"><label>单价</label><input type="number" value="12.5" /></div><div class="form-field"><label>目标货位</label><input value="RM-A01" /></div></div>`,
        purchaseReceipt: `<div class="form-grid"><div class="form-field"><label>PO 编号</label><input value="PO-20260504-0001" /></div><div class="form-field"><label>收货数量</label><input type="number" value="100" /></div><div class="form-field"><label>批次号</label><input value="BATCH-RM001-P5-001" /></div><div class="form-field"><label>目标货位</label><input value="RM-A01" /></div><div class="form-field"><label>移动类型</label><input value="101" disabled /></div><div class="form-field"><label>过账日期</label><input type="datetime-local" /></div></div>`,
        salesOrder: `<div class="form-grid"><div class="form-field"><label>客户</label><input value="CUST001" /></div><div class="form-field"><label>需求日期</label><input type="date" value="2026-05-20" /></div><div class="form-field"><label>物料</label><input value="FIN001" /></div><div class="form-field"><label>销售数量</label><input type="number" value="20" /></div><div class="form-field"><label>单价</label><input type="number" value="99.9" /></div><div class="form-field"><label>来源货位</label><input value="FG-A01" /></div></div>`,
        salesShipment: `<div class="form-grid"><div class="form-field"><label>SO 编号</label><input value="SO-20260504-0001" /></div><div class="form-field"><label>发货数量</label><input type="number" value="20" /></div><div class="form-field"><label>拣配策略</label><select><option>FEFO</option><option>MANUAL</option></select></div><div class="form-field"><label>来源货位</label><input value="FG-A01" /></div><div class="form-field"><label>移动类型</label><input value="261" disabled /></div><div class="form-field"><label>过账日期</label><input type="datetime-local" /></div></div>`,
        inventoryPost: `<div class="form-grid"><div class="form-field"><label>物料</label><input value="RM001" /></div><div class="form-field"><label>移动类型</label><select><option>101</option><option>261</option><option>311</option><option>701</option><option>702</option><option>999</option></select></div><div class="form-field"><label>数量</label><input type="number" value="10" /></div><div class="form-field"><label>批次</label><input value="BATCH-RM001-001" /></div><div class="form-field"><label>来源货位</label><input placeholder="出库/转储填写" /></div><div class="form-field"><label>目标货位</label><input placeholder="入库/转储填写" /></div></div>`,
        productionComplete: `<div class="form-grid"><div class="form-field"><label>生产订单</label><input value="MO-20260504-0001" /></div><div class="form-field"><label>完工数量</label><input type="number" value="100" /></div><div class="form-field"><label>成品批次</label><input value="BATCH-FIN001-P6-001" /></div><div class="form-field"><label>入库货位</label><input value="FG-A01" /></div><div class="form-field"><label>领料策略</label><select><option>FEFO</option></select></div><div class="form-field"><label>过账日期</label><input type="datetime-local" /></div></div>`,
        inventoryCount: `<div class="form-grid"><div class="form-field"><label>盘点类型</label><select><option>REGULAR</option><option>CYCLE</option></select></div><div class="form-field"><label>盘点范围</label><select><option>BIN</option><option>MATERIAL</option><option>ZONE</option></select></div><div class="form-field"><label>货位</label><input value="RM-A01" /></div><div class="form-field"><label>备注</label><input value="regular bin count" /></div></div>`,
        inspectionLot: `<div class="form-grid"><div class="form-field"><label>检验类型</label><select><option>PURCHASE_RECEIPT</option><option>PRODUCTION_RECEIPT</option><option>MANUAL</option></select></div><div class="form-field"><label>物料</label><input value="RM001" /></div><div class="form-field"><label>批次</label><input value="BATCH-RM001-002" /></div><div class="form-field"><label>样本数</label><input type="number" value="5" /></div></div>`,
        qualityNotification: `<div class="form-grid"><div class="form-field"><label>来源</label><select><option>INSPECTION_LOT</option><option>MANUAL</option></select></div><div class="form-field"><label>严重等级</label><select><option>LOW</option><option>MEDIUM</option><option>HIGH</option><option>CRITICAL</option></select></div><div class="form-field"><label>批次</label><input value="BATCH-RM001-002" /></div><div class="form-field"><label>不良代码</label><input value="DEF-SCRATCH" /></div><div class="form-field full"><label>问题描述</label><textarea>检验发现外观划伤</textarea></div></div>`,
        quick: `<div class="grid"><button class="btn success" onclick="showToast('打开采购收货')">采购收货 101</button><button class="btn warning" onclick="showToast('打开销售发货')">销售发货 261</button><button class="btn primary" onclick="showToast('打开生产完工')">生产完工</button><button class="btn danger" onclick="showToast('打开批次冻结')">冻结批次</button></div>`,
        detail: `<div class="empty">这里展示单据详情、行项目、状态流转、审计记录和关联库存事务。</div>`
      };
      return forms[type] || `<div class="form-grid">${commonFields}</div>`;
    }

    function openModal(title, type) {
      document.getElementById('modalTitle').textContent = title;
      document.getElementById('modalBody').innerHTML = modalForm(type);
      document.getElementById('modalMask').classList.add('show');
    }

    function closeModal() {
      document.getElementById('modalMask').classList.remove('show');
    }

    function submitModal() {
      closeModal();
      showToast('提交成功，业务状态已更新');
    }

    function showToast(message) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2200);
    }

    function refreshPage() {
      showToast('页面数据已刷新');
    }

    function exportCsv() {
      showToast('CSV 导出任务已生成');
    }

    function filterTable(keyword) {
      const table = document.getElementById('dataTable');
      if (!table) return;
      const rows = table.querySelectorAll('tbody tr');
      rows.forEach(row => {
        row.style.display = row.textContent.toLowerCase().includes(keyword.toLowerCase()) ? '' : 'none';
      });
    }

    document.querySelectorAll('.nav-item').forEach(item => {
      item.addEventListener('click', () => {
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        item.classList.add('active');
        renderPage(item.dataset.page);
      });
    });

    // ==================== 初始化 ====================
    // 检查是否已登录
    if (authToken) {
      const storedUser = localStorage.getItem('currentUser');
      if (storedUser) {
        try {
          currentUser = JSON.parse(storedUser);
          showMainApp();
        } catch (e) {
          console.error('Failed to parse stored user:', e);
          logout();
        }
      } else {
        logout();
      }
    } else {
      showLoginPage();
    }
  </script>
</body>
</html>
