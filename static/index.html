<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IMS Workspace 管理后台</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --panel: #ffffff;
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --text: #172033;
      --muted: #64748b;
      --border: #e2e8f0;
      --success: #16a34a;
      --warning: #d97706;
      --danger: #dc2626;
      --info: #0891b2;
      --shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
      --radius: 14px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    body.auth-pending > .app,
    body.auth-pending > .modal-mask,
    body.auth-pending > .toast {
      visibility: hidden;
    }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 260px 1fr;
    }

    .sidebar {
      background: #0f172a;
      color: #e5e7eb;
      padding: 18px 14px;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow-y: auto;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 10px 18px;
      border-bottom: 1px solid rgba(255,255,255,0.12);
      margin-bottom: 12px;
    }

    .brand-logo {
      width: 38px;
      height: 38px;
      border-radius: 12px;
      background: linear-gradient(135deg, #2563eb, #22c55e);
      display: grid;
      place-items: center;
      font-weight: 800;
    }

    .brand small { color: #94a3b8; display: block; margin-top: 3px; }

    .nav-section-title {
      font-size: 12px;
      color: #94a3b8;
      padding: 16px 10px 8px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .nav-item {
      width: 100%;
      border: 0;
      background: transparent;
      color: #cbd5e1;
      text-align: left;
      padding: 10px 12px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .nav-item:hover { background: rgba(255,255,255,0.08); color: #fff; }
    .nav-item.active { background: var(--primary); color: #fff; }
    .nav-item .badge { font-size: 11px; color: #cbd5e1; }

    .main {
      min-width: 0;
      padding: 20px 24px 40px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-bottom: 20px;
    }

    .topbar h1 {
      margin: 0;
      font-size: 24px;
    }

    .topbar p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 14px;
    }

    .top-actions {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .search-global {
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 10px 14px;
      min-width: 260px;
      outline: none;
    }

    .btn {
      border: 0;
      border-radius: 10px;
      padding: 10px 14px;
      cursor: pointer;
      font-weight: 600;
      background: #e2e8f0;
      color: #0f172a;
    }

    .btn.primary { background: var(--primary); color: #fff; }
    .btn.primary:hover { background: var(--primary-dark); }
    .btn.success { background: var(--success); color: #fff; }
    .btn.warning { background: var(--warning); color: #fff; }
    .btn.danger { background: var(--danger); color: #fff; }
    .btn.ghost { background: transparent; border: 1px solid var(--border); }
    .btn.small { padding: 7px 10px; font-size: 12px; }

    .grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 16px;
      margin-bottom: 18px;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 16px;
    }

    .metric .label { color: var(--muted); font-size: 13px; }
    .metric .value { font-size: 28px; font-weight: 800; margin-top: 8px; }
    .metric .trend { font-size: 12px; margin-top: 8px; color: var(--success); }

    .toolbar {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 12px;
      display: flex;
      gap: 10px;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    .toolbar-left, .toolbar-right { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }

    input, select, textarea {
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 9px 10px;
      outline: none;
      background: #fff;
      min-height: 38px;
    }

    textarea { resize: vertical; min-height: 80px; }

    table {
      width: 100%;
      border-collapse: collapse;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow);
    }

    th, td {
      padding: 12px 14px;
      border-bottom: 1px solid var(--border);
      text-align: left;
      font-size: 13px;
      vertical-align: middle;
    }

    th {
      background: #f8fafc;
      color: #334155;
      font-size: 12px;
      letter-spacing: 0.02em;
      text-transform: uppercase;
    }

    tr:hover td { background: #f8fafc; }

    .status {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 4px 9px;
      font-size: 12px;
      font-weight: 700;
    }

    .status.green { background: #dcfce7; color: #166534; }
    .status.blue { background: #dbeafe; color: #1e40af; }
    .status.yellow { background: #fef3c7; color: #92400e; }
    .status.red { background: #fee2e2; color: #991b1b; }
    .status.gray { background: #e5e7eb; color: #374151; }

    .panel-title {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .panel-title h2 { margin: 0; font-size: 18px; }

    .split {
      display: grid;
      grid-template-columns: 1.2fr 0.8fr;
      gap: 16px;
    }

    .timeline {
      display: grid;
      gap: 10px;
    }

    .timeline-item {
      border-left: 3px solid var(--primary);
      padding: 8px 10px;
      background: #f8fafc;
      border-radius: 10px;
    }

    .timeline-item strong { display: block; font-size: 13px; }
    .timeline-item span { color: var(--muted); font-size: 12px; }

    .modal-mask {
      position: fixed;
      inset: 0;
      background: rgba(15,23,42,0.55);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      padding: 20px;
    }

    .modal-mask.show { display: flex; }

    .modal {
      width: min(760px, 100%);
      max-height: 88vh;
      overflow-y: auto;
      background: var(--panel);
      border-radius: 18px;
      box-shadow: 0 30px 80px rgba(0,0,0,0.25);
      padding: 20px;
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
    }

    .modal-header h3 { margin: 0; }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .form-field label {
      display: block;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .form-field input, .form-field select, .form-field textarea { width: 100%; }

    .form-field.full { grid-column: 1 / -1; }

    .detail-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 16px;
    }

    .detail-field {
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 12px;
      background: #f8fafc;
      min-width: 0;
    }

    .detail-field label {
      display: block;
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 6px;
    }

    .detail-field span {
      display: block;
      font-weight: 700;
      overflow-wrap: anywhere;
    }

    .detail-section {
      margin-top: 12px;
    }

    .detail-section table {
      box-shadow: none;
    }

    .modal-footer {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 16px;
    }

    .toast {
      position: fixed;
      right: 24px;
      bottom: 24px;
      background: #0f172a;
      color: #fff;
      padding: 12px 16px;
      border-radius: 12px;
      display: none;
      box-shadow: var(--shadow);
      z-index: 1100;
    }

    .toast.show { display: block; }

    .empty {
      padding: 40px;
      text-align: center;
      color: var(--muted);
      background: var(--panel);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
    }

    @media (max-width: 1100px) {
      .app { grid-template-columns: 1fr; }
      .sidebar { position: static; height: auto; }
      .grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .split { grid-template-columns: 1fr; }
    }

    @media (max-width: 720px) {
      .main { padding: 14px; }
      .topbar { flex-direction: column; align-items: flex-start; }
      .top-actions { width: 100%; flex-wrap: wrap; }
      .search-global { min-width: 100%; }
      .grid { grid-template-columns: 1fr; }
      .detail-grid { grid-template-columns: 1fr; }
      .form-grid { grid-template-columns: 1fr; }
      table { display: block; overflow-x: auto; white-space: nowrap; }
    }
  </style>
</head>

    const TRUSTED_HTML = Symbol('trustedHtml');

    function html(value) {
      return String(value ?? '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function trustedHtml(markup) {
      const value = String(markup ?? '');
      return {
        [TRUSTED_HTML]: true,
        value,
        toString() {
          return value;
        }
      };
    }

    function renderOutput(value) {
      if (value && typeof value === 'object' && value[TRUSTED_HTML]) return value.value;
      return html(displayValue(value));
    }

    function errorMessage(error, fallback = '未知错误') {
      const raw = typeof error === 'string'
        ? error
        : error?.message || error?.error_code || error?.statusText || '';
      const message = String(raw ?? '').trim();
      if (message === 'Failed to fetch') {
        return '无法连接 API 服务，请确认页面来自 cuba-api 服务地址并且后端正在运行。';
      }
      if (message) return message;
      if (error?.status) return `${error.status} ${fallback}`.trim();
      return fallback;
    }

    function encodedId(value) {
      return encodeURIComponent(String(value ?? ''));
    }

    function decodedId(value) {
      return decodeURIComponent(value || '');
    }

    function normalizeDateTime(value) {
      if (!value) return null;
      const parsed = new Date(value);
      return Number.isNaN(parsed.getTime()) ? value : parsed.toISOString();
    }

    function stripEmpty(value) {
      if (Array.isArray(value)) return value.map(stripEmpty);
      if (!value || typeof value !== 'object') return value;
      return Object.fromEntries(
        Object.entries(value)
          .filter(([, v]) => v !== '' && v !== undefined)
          .map(([k, v]) => [k, stripEmpty(v)])
      );
    }

    function queryString(params) {
      const search = new URLSearchParams();
      Object.entries(params).forEach(([key, value]) => {
        if (value !== undefined && value !== null && value !== '') search.set(key, value);
      });
      const text = search.toString();
      return text ? `?${text}` : '';
    }

    function resourceUrl(base, id) {
      return `${base.replace(/\/$/, '')}/${encodedId(id)}`;
    }

    function pick(record, keys, fallback = '-') {
      const keyList = Array.isArray(keys) ? keys : [keys];
      for (const key of keyList) {
        if (!key) continue;
        const value = String(key).split('.').reduce((acc, part) => acc == null ? undefined : acc[part], record);
        if (value !== undefined && value !== null && value !== '') return value;
      }
      return fallback;
    }

    function displayValue(value) {
      if (value === null || value === undefined || value === '') return '-';
      if (typeof value === 'boolean') return value ? '是' : '否';
      if (typeof value === 'object') return JSON.stringify(value);
      return String(value);
    }

    function shortDate(value) {
      if (!value) return '-';
      return String(value).replace('T', ' ').replace(/\.\d+Z?$/, '').replace('Z', '');
    }

    function selectedValue(id) {
      return document.getElementById(id)?.value || '';
    }

    function statusClass(value) {
      const text = String(value ?? '').toUpperCase();
      if (['合格','正常','一致','完成','ACTIVE','OPEN','RECEIVED','SHIPPED','COMPLETED','POSTED','CLOSED','QUALIFIED','ACCEPT','CONFIRMED'].includes(String(value)) || ['ACTIVE','OPEN','RECEIVED','SHIPPED','COMPLETED','POSTED','CLOSED','QUALIFIED','ACCEPT','CONFIRMED'].includes(text)) return 'green';
      if (['部分到货','部分发货','已审批','已下达'].includes(String(value)) || ['PARTIAL','PARTIALLY_RECEIVED','PARTIALLY_SHIPPED','RUNNING','COUNTING','RELEASED','IN_PROGRESS','RESULT_ENTERED','APPROVED'].includes(text)) return 'blue';
      if (['待检','待到货','草稿','LOW','WARNING','DRAFT','PLANNED','SUBMITTED','CREATED','PENDING','MANUAL'].includes(String(value)) || ['LOW','WARNING','DRAFT','PLANNED','SUBMITTED','CREATED','PENDING','MANUAL'].includes(text)) return 'yellow';
      if (['冻结','报废','取消','FAILED','CANCELLED','异常','不一致','FROZEN','SCRAPPED','FAIL','CRITICAL','HIGH'].includes(String(value)) || ['FAILED','CANCELLED','FROZEN','SCRAPPED','FAIL','CRITICAL','HIGH'].includes(text)) return 'red';
      return 'gray';
    }

    function badge(value) {
      return trustedHtml(`<span class="status ${statusClass(value)}">${html(displayValue(value))}</span>`);
    }

    async function refreshAccessToken() {
      if (!refreshToken) return false;
      try {
        const response = await fetch(`${API_BASE_URL}/api/auth/refresh`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ refresh_token: refreshToken })
        });
        if (!response.ok) return false;
        const payload = await response.json();
        if (!payload.success || !payload.data) return false;
        authToken = payload.data.access_token;
        refreshToken = payload.data.refresh_token;
        currentUser = payload.data.user;
        localStorage.setItem('authToken', authToken);
        localStorage.setItem('refreshToken', refreshToken);
        localStorage.setItem('currentUser', JSON.stringify(currentUser));
        return true;
      } catch (error) {
        return false;
      }
    }

    async function apiCall(endpoint, options = {}) {
      const headers = {
        ...(options.body ? { 'Content-Type': 'application/json' } : {}),
        ...(options.headers || {})
      };
      if (authToken && !options.skipAuth) headers.Authorization = `Bearer ${authToken}`;

      const ignoreForbidden = Boolean(options.ignoreForbidden);
      const responseType = options.responseType;
      const requestOptions = { ...options, headers };
      delete requestOptions.skipAuth;
      delete requestOptions.skipRefresh;
      delete requestOptions.ignoreForbidden;
      delete requestOptions.responseType;

      let response = await fetch(`${API_BASE_URL}${endpoint}`, requestOptions);
      if ((response.status === 401 || response.status === 403) && !options.skipRefresh && refreshToken) {
        const refreshed = await refreshAccessToken();
        if (refreshed) {
          headers.Authorization = `Bearer ${authToken}`;
          response = await fetch(`${API_BASE_URL}${endpoint}`, requestOptions);
        }
      }

      if (!response.ok) {
        const contentType = response.headers.get('content-type') || '';
        let data = '';
        try {
          data = contentType.includes('application/json') ? await response.json() : await response.text();
        } catch (error) {
          data = '';
        }
        const fallback = `${response.status} ${response.statusText || '请求失败'}`.trim();
        const message = typeof data === 'string'
          ? (data.trim() || fallback)
          : errorMessage(data, fallback || '请求失败');
        if (response.status === 401 || (response.status === 403 && !ignoreForbidden)) logout();
        const error = new Error(message);
        error.status = response.status;
        error.endpoint = endpoint;
        throw error;
      }
      if (responseType === 'blob') return await response.blob();
      if (responseType === 'text') return await response.text();

      const contentType = response.headers.get('content-type') || '';
      let data = '';
      try {
        data = contentType.includes('application/json') ? await response.json() : await response.text();
      } catch (error) {
        data = '';
      }
      return data;
    }

    async function apiData(endpoint, options = {}) {
      const payload = await apiCall(endpoint, options);
      return payload && typeof payload === 'object' && 'data' in payload ? payload.data : payload;
    }

    async function login(username, password) {
      try {
        const response = await apiCall('/api/auth/login', {
          method: 'POST',
          skipAuth: true,
          skipRefresh: true,
          body: JSON.stringify({ username, password })
        });
        if (!response.success || !response.data) throw new Error(response.message || '登录失败');
        authToken = response.data.access_token;
        refreshToken = response.data.refresh_token;
        currentUser = response.data.user;
        localStorage.setItem('authToken', authToken);
        localStorage.setItem('refreshToken', refreshToken);
        localStorage.setItem('currentUser', JSON.stringify(currentUser));
        showMainApp();
        showToast(`欢迎回来，${currentUser.display_name || currentUser.username}！`);
      } catch (error) {
        showToast(`登录失败: ${errorMessage(error)}`);
      }
    }

    function logout() {
      authToken = null;
      refreshToken = null;
      currentUser = null;
      localStorage.removeItem('authToken');
      localStorage.removeItem('refreshToken');
      localStorage.removeItem('currentUser');
      showLoginPage();
    }

    function renderPurchaseOrderDetail(record) {

    function normalizeItems(data, fallbackPage = 1, fallbackPageSize = DEFAULT_PAGE_SIZE) {
      if (Array.isArray(data)) return { items: data, page: fallbackPage, page_size: fallbackPageSize, total: null };
      if (data && Array.isArray(data.items)) return { ...data, page: data.page || fallbackPage, page_size: data.page_size || fallbackPageSize };
      if (data && typeof data === 'object') return { items: [data], page: fallbackPage, page_size: 1, total: 1 };
      return { items: [], page: fallbackPage, page_size: fallbackPageSize, total: 0 };
    }

    function renderToolbarFor(page, config) {
      const state = pageState[page] || {};
      const createButton = config.noCreate || !config.fields ? '' : `<button class="btn primary" type="button" onclick="openRecordModal('${page}', 'create')">新增</button>`;
      const globalButtons = (config.globalActions || []).map((action, index) =>
        `<button class="btn primary" type="button" onclick="openGlobalAction('${page}', ${index})">${html(action.label)}</button>`
      ).join('');
      const exportButton = config.exportEndpoint ? `<button class="btn ghost" type="button" onclick="exportCsv()">导出 CSV</button>` : '';
      return `
        <div class="toolbar">
          <div class="toolbar-left">
            <input id="${page}Search" placeholder="${html(config.searchPlaceholder || '输入筛选值')}" value="${html(state.keyword || '')}" onkeydown="if(event.key==='Enter') searchPage('${page}')" />
            <button class="btn ghost" type="button" onclick="searchPage('${page}')">搜索</button>
          </div>
          <div class="toolbar-right">
            <button class="btn ghost" type="button" onclick="refreshPage()">刷新</button>
            ${exportButton}
            ${globalButtons}
            ${createButton}
          </div>
        </div>
      `;
    }

    function recordId(record, config) {
      const idField = config.idField;
      if (Array.isArray(idField)) return idField.map(key => pick(record, key, '')).filter(Boolean).join('|');
      return pick(record, idField, '');
    }

    function renderCell(record, column) {
      const [, key, formatter] = column;
      const raw = typeof key === 'function' ? key(record) : pick(record, key);
      if (formatter) return renderOutput(formatter(raw, record));
      return html(displayValue(raw));
    }

    function renderRecordActions(page, config, record) {
      if (config.noRecordActions) return '';
      const id = recordId(record, config);
      const detail = id ? `<button class="btn small ghost" type="button" onclick="openRecordModal('${page}', 'view', '${encodedId(id)}')">详情</button>` : '';
      const edit = id && config.fields && !config.noCreate && !config.noEdit ? `<button class="btn small primary" type="button" onclick="openRecordModal('${page}', 'edit', '${encodedId(id)}')">编辑</button>` : '';
      const extra = (config.actions || []).map((action, index) =>
        `<button class="btn small ghost" type="button" onclick="openRecordAction('${page}', '${encodedId(id)}', ${index})">${html(action.label)}</button>`
      ).join(' ');
      return `<td>${detail} ${edit} ${extra}</td>`;
    }

    function emptyStateMessage(page, config) {
      const state = pageState[page] || {};
      if (state.keyword && config.searchParam) {
        return `当前筛选没有结果：${state.keyword}`;
      }
      return config.emptyMessage || '暂无数据。若确认数据库已有记录，请检查当前账号权限和 API 服务地址。';
    }

      return `
        <table id="dataTable">
          <thead><tr>${config.columns.map(([label]) => `<th>${html(label)}</th>`).join('')}${config.noRecordActions ? '' : '<th>操作</th>'}</tr></thead>
          <tbody>
            ${items.map(record => `
              <tr>
                ${config.columns.map(column => `<td>${renderCell(record, column)}</td>`).join('')}
                ${renderRecordActions(page, config, record)}
              </tr>
            `).join('')}
          </tbody>
        </table>
      `;
    }

    function renderPagination(page, data) {
      const pageNo = Number(data.page || pageState[page]?.page || 1);
      const pageSize = Number(data.page_size || DEFAULT_PAGE_SIZE);
      const total = Number(data.total || 0);
      const hasTotal = Number.isFinite(total) && total > 0;
      const hasNext = hasTotal ? pageNo * pageSize < total : (data.items || []).length >= pageSize;
      return `
        <div style="display:flex;justify-content:center;align-items:center;gap:10px;margin-top:16px;">
          <button class="btn ghost small" type="button" onclick="goToDataPage('${page}', ${pageNo - 1})" ${pageNo <= 1 ? 'disabled' : ''}>上一页</button>
          <span>第 ${pageNo} 页${hasTotal ? ` / 共 ${total} 条` : ''}</span>
          <button class="btn ghost small" type="button" onclick="goToDataPage('${page}', ${pageNo + 1})" ${hasNext ? '' : 'disabled'}>下一页</button>
        </div>
      `;
    }

    async function renderResourcePage(page) {
      const config = pageConfigs[page];
      const state = pageState[page] || { page: 1, keyword: '' };
      pageState[page] = state;
      const params = { page: state.page || 1, page_size: DEFAULT_PAGE_SIZE };
      if (state.keyword && config.searchParam) params[config.searchParam] = state.keyword;
      let data;
      try {
        data = normalizeItems(await apiData(`${config.endpoint}${queryString(params)}`), params.page, params.page_size);
      } catch (error) {
        throw error;
      }
      state.items = data.items;
      return renderToolbarFor(page, config) + renderRecordTable(page, config, data.items) + renderPagination(page, data);
    }

    function searchPage(page) {
      const input = document.getElementById(`${page}Search`);
      const nextState = { ...(pageState[page] || {}), keyword: input?.value || '', page: 1 };
      if (page === 'audit') {
        nextState.category = selectedValue('auditCategory');
        nextState.module = selectedValue('auditModule');
      }
      pageState[page] = nextState;
      renderPage(page);
    }

    function runGlobalSearch(rawKeyword) {
      const keyword = String(rawKeyword || '').trim();
      if (!keyword) {
        showToast('请输入搜索关键词');
        return;
      }

      const config = pageConfigs[currentPage];
      if (config?.searchParam) {
        pageState[currentPage] = { ...(pageState[currentPage] || {}), keyword, page: 1 };
        renderPage(currentPage);
        return;
      }

      if (currentPage === 'batchTrace' || currentPage === 'serialTrace') {
        const input = document.getElementById('traceValue');
        if (input) input.value = keyword;
        runTrace(currentPage === 'batchTrace' ? 'batch' : 'serial');
        return;
      }

      pageState.inventoryCurrent = { ...(pageState.inventoryCurrent || {}), keyword, page: 1 };
      renderPage('inventoryCurrent');
    }

    function goToDataPage(page, pageNo) {
      if (pageNo < 1) return;
      pageState[page] = { ...(pageState[page] || {}), page: pageNo };
      renderPage(page);
    }

    function findCachedRecord(page, id) {
      const config = pageConfigs[page];
      return (pageState[page]?.items || []).find(item => recordId(item, config) === id);
    }

    async function loadRecord(page, id, options = {}) {
      const config = pageConfigs[page];
      const shouldUseCache = !(options.mode === 'view' && config.forceDetailLoad);
      const cached = shouldUseCache ? findCachedRecord(page, id) : null;
      if (cached) return cached;
      return await apiData(resourceUrl(config.endpoint, id));
    }

    function fieldsForMode(config, mode) {
      return (config.fields || []).filter(field => {
        if (field.createOnly && mode !== 'create') return false;
        if (field.editOnly && mode === 'create') return false;
        return true;
      });
    }

    function renderFormFields(fields, record = {}, readonly = false) {
      return `<div class="form-grid">${fields.map(field => {
        const value = record[field.name] ?? field.defaultValue ?? '';
        const id = `field_${field.name}`;
        const label = `${html(field.label)}${field.required ? ' *' : ''}`;
        const disabled = readonly || field.readonly ? 'disabled' : '';
        const common = `id="${id}" name="${html(field.name)}" ${disabled} ${field.required ? 'required' : ''}`;
        let input = '';
        if (field.type === 'select') {
          input = `<select ${common}>${(field.options || []).map(option => `<option value="${html(option)}" ${String(value) === String(option) ? 'selected' : ''}>${html(option || '空')}</option>`).join('')}</select>`;
        } else if (field.type === 'textarea') {
          input = `<textarea ${common}>${html(value)}</textarea>`;
        } else {
          input = `<input type="${field.type || 'text'}" value="${html(value)}" ${common} />`;
        }
        return `<div class="form-field ${field.full ? 'full' : ''}"><label for="${id}">${label}</label>${input}</div>`;
      }).join('')}</div>`;
    }

    function renderModalForm(fields, record = {}, readonly = false) {
      return `<form id="modalForm" onsubmit="event.preventDefault(); submitModal();">${renderFormFields(fields, record, readonly)}</form>`;
    }

    function validateModalForm() {
      const form = document.getElementById('modalForm');
      if (!form) return true;
      if (form.checkValidity()) return true;
      form.reportValidity();
      return false;
    }

    function castField(value, field) {
      if (value === '') return '';
      if (field.cast === 'int') return parseInt(value, 10) || 0;
      if (field.cast === 'decimal') return Number(value);
      if (field.cast === 'datetime') return normalizeDateTime(value);
      return value;
    }

    function collectFields(fields) {
      const form = {};
      fields.forEach(field => {
        const element = document.getElementById(`field_${field.name}`);
        if (!element) return;
        form[field.name] = castField(element.value, field);
      });
      return stripEmpty(form);
    }

    function setModalFooter(htmlText) {
      const footer = document.querySelector('.modal-footer');
      if (footer) footer.innerHTML = htmlText;
    }

    function openModalMask() {
      const mask = document.getElementById('modalMask');
      const dialog = mask?.querySelector('.modal');
      if (!mask || !dialog) return;
      lastFocusedElement = document.activeElement instanceof HTMLElement ? document.activeElement : null;
      mask.classList.add('show');
      mask.setAttribute('aria-hidden', 'false');
      requestAnimationFrame(() => {
        const firstFocusable = dialog.querySelector('input, select, textarea, button, [href], [tabindex]:not([tabindex="-1"])');
        (firstFocusable || dialog).focus();
      });
    }

    async function openRecordModal(page, mode, encoded) {
      const config = pageConfigs[page];
      const id = decodedId(encoded);
      const record = mode === 'create' ? {} : await loadRecord(page, id, { mode });
      const fields = fieldsForMode(config, mode);
      const title = mode === 'create' ? pageMeta[page][0].replace('管理', '') + '新增' : mode === 'edit' ? '编辑记录' : '记录详情';
      modalContext = { kind: 'record', page, mode, id, fields };
      document.getElementById('modalTitle').textContent = title;
      document.getElementById('modalBody').innerHTML = mode === 'view' && config.detailRenderer
        ? config.detailRenderer(record)
        : renderModalForm(fields, record, mode === 'view');
      setModalFooter(mode === 'view'
        ? '<button class="btn ghost" type="button" onclick="closeModal()">关闭</button>'
        : '<button class="btn ghost" type="button" onclick="closeModal()">取消</button><button class="btn primary" type="submit" form="modalForm">确认</button>'
      );
      openModalMask();
    }

    function openGlobalAction(page, index) {
      const action = pageConfigs[page].globalActions[index];
      openActionModal({ kind: 'globalAction', page, action, id: null });
    }

    function openRecordAction(page, encoded, index) {
      const action = pageConfigs[page].actions[index];
      openActionModal({ kind: 'recordAction', page, action, id: decodedId(encoded) });
    }

    function openActionModal(context) {
      const fields = context.action.fields || [];
      modalContext = { ...context, fields };
      document.getElementById('modalTitle').textContent = context.action.label;
      document.getElementById('modalBody').innerHTML = fields.length
        ? renderModalForm(fields)
        : `<div class="empty">确认执行：${html(context.action.label)}</div>`;
      setModalFooter(fields.length
        ? '<button class="btn ghost" type="button" onclick="closeModal()">取消</button><button class="btn primary" type="submit" form="modalForm">确认</button>'
        : '<button class="btn ghost" type="button" onclick="closeModal()">取消</button><button class="btn primary" type="button" onclick="submitModal()">确认</button>'
      );
      openModalMask();
    }

    async function submitModal() {
      if (!modalContext) {
        closeModal();
        showToast('提交成功');
        return;
      }

      if (!validateModalForm()) return;

      try {
        if (modalContext.kind === 'record') {
          const config = pageConfigs[modalContext.page];
          const form = collectFields(modalContext.fields);
          const isCreate = modalContext.mode === 'create';
          const endpoint = isCreate ? config.endpoint : resourceUrl(config.endpoint, modalContext.id);
          const method = isCreate ? 'POST' : 'PATCH';
          if (!isCreate && config.noEdit) throw new Error('当前页面未提供更新接口');
          const bodyBuilder = isCreate ? config.createBody : config.updateBody;
          const body = bodyBuilder ? bodyBuilder(form) : form;
          await apiData(endpoint, { method, body: JSON.stringify(body) });
          showToast(isCreate ? '创建成功' : '更新成功');
        } else {
          const action = modalContext.action;
          const form = collectFields(modalContext.fields);
          const endpoint = typeof action.endpoint === 'function' ? action.endpoint(modalContext.id, form) : action.endpoint;
          const body = action.body ? action.body(form) : form;
          await apiData(endpoint, { method: action.method || 'POST', body: JSON.stringify(body || {}) });
          showToast(action.success || '操作完成');
        }
        closeModal();
        renderPage(currentPage);
      } catch (error) {
        showToast(`操作失败: ${errorMessage(error)}`);
      }
    }

    function closeModal() {
      modalContext = null;
      const mask = document.getElementById('modalMask');
      if (mask) {
        mask.classList.remove('show');
        mask.setAttribute('aria-hidden', 'true');
      }
      if (lastFocusedElement?.isConnected) lastFocusedElement.focus();
      lastFocusedElement = null;
    }

    document.addEventListener('keydown', (event) => {
      if (event.key === 'Escape' && document.getElementById('modalMask')?.classList.contains('show')) {
        closeModal();
      }
    });

    function openModal(title, type) {
      modalContext = null;
      document.getElementById('modalTitle').textContent = title;
      if (type === 'quick') {
        document.getElementById('modalBody').innerHTML = `<div class="grid">
          <button class="btn success" type="button" onclick="renderPage('purchaseReceipt'); closeModal()">采购收货 101</button>
          <button class="btn warning" type="button" onclick="renderPage('salesShipment'); closeModal()">销售发货 261</button>
          <button class="btn primary" type="button" onclick="renderPage('productionComplete'); closeModal()">生产完工</button>
          <button class="btn danger" type="button" onclick="renderPage('batchStock'); closeModal()">批次处理</button>
        </div>`;
      } else {
        document.getElementById('modalBody').innerHTML = '<div class="empty">该操作已迁移到当前页面的真实接口按钮。</div>';
      }
      setModalFooter('<button class="btn ghost" type="button" onclick="closeModal()">关闭</button>');
      openModalMask();
    }

    async function refreshPage() {
      await renderPage(currentPage);
      showToast('页面数据已刷新');
    }

    async function exportCsv() {
      const config = pageConfigs[currentPage];
      if (!config?.exportEndpoint) {
        showToast('当前页面未提供导出接口');
        return;
      }
      try {
        const state = pageState[currentPage] || {};
        const params = { format: 'csv', include_headers: true };
        if (state.keyword && config.searchParam) params[config.searchParam] = state.keyword;
        const blob = await apiCall(`${config.exportEndpoint}${queryString(params)}`, { responseType: 'blob' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.href = url;
        link.download = `${currentPage}.csv`;
        link.click();
        URL.revokeObjectURL(url);
        showToast('CSV 已导出');
      } catch (error) {
        showToast(`导出失败: ${errorMessage(error)}`);
      }
    }

      await apiData('/api/reports/refresh', { method: 'POST', body: JSON.stringify({ mode: 'all', concurrently: true }) });
      showToast('报表物化视图已刷新');

    async function renderDashboard() {
      const emptyPage = () => ({ items: [], page: 1, page_size: DEFAULT_PAGE_SIZE, total: 0 });
      const safePage = async (endpoint) => {
        try {
          return { ...normalizeItems(await apiData(endpoint, { ignoreForbidden: true })), ok: true };
        } catch (error) {
          return { ...emptyPage(), ok: false, error: error.message };
        }
      };
      const countOf = (page) => Number(page.total || 0) || (page.items || []).length;
      const [stockPage, lowPage, poPage, soPage, lotsPage] = await Promise.all([
        safePage('/api/reports/current-stock?page=1&page_size=1'),
        safePage('/api/reports/low-stock-alert?page=1&page_size=20'),
        safePage('/api/purchase-orders?page=1&page_size=5'),
        safePage('/api/sales-orders?page=1&page_size=5'),
        safePage('/api/quality/inspection-lots?page=1&page_size=5')
      ]);
      const tasks = [
        ...poPage.items.map(item => ({ task_type: '采购订单', doc_id: item.po_id, target: item.supplier_id, status: item.status })),
        ...soPage.items.map(item => ({ task_type: '销售订单', doc_id: item.so_id, target: item.customer_id, status: item.status })),
        ...lotsPage.items.map(item => ({ task_type: '质量检验', doc_id: item.id, target: item.batch_number, status: item.status }))
      ].slice(0, 8);
      const failedCount = [stockPage, lowPage, poPage, soPage, lotsPage].filter(page => !page.ok).length;
      const dashboardStatus = failedCount ? `${failedCount} 个接口不可用或无权限，已跳过。` : '全部接口已加载。';
      const taskTableConfig = {
        columns: [['任务类型','task_type'], ['单据','doc_id'], ['对象','target'], ['状态','status', badge]],
        noRecordActions: true
      };
      return `
        <div class="grid">
          <div class="card metric"><div class="label">库存行</div><div class="value">${countOf(stockPage)}</div><div class="trend">来自 /api/reports/current-stock</div></div>
          <div class="card metric"><div class="label">低库存预警</div><div class="value">${countOf(lowPage)}</div><div class="trend" style="color:var(--warning)">来自报表接口</div></div>
          <div class="card metric"><div class="label">待处理采购</div><div class="value">${countOf(poPage)}</div><div class="trend">采购订单接口</div></div>
          <div class="card metric"><div class="label">待处理销售</div><div class="value">${countOf(soPage)}</div><div class="trend">销售订单接口</div></div>
        </div>
        <div class="split">
          <div class="card">
            <div class="panel-title"><h2>待处理任务</h2><button class="btn small ghost" type="button" onclick="refreshPage()">刷新</button></div>
            ${tasks.length ? renderRecordTable('dashboardTasks', taskTableConfig, tasks) : '<div class="empty">暂无待处理任务，或当前账号权限不足。</div>'}
          </div>
          <div class="card">
            <div class="panel-title"><h2>系统入口</h2></div>
            <div class="timeline">
              <div class="timeline-item"><strong>首页加载</strong><span>${dashboardStatus}</span></div>
              <div class="timeline-item"><strong>主数据</strong><span>物料、货位、供应商、客户、BOM 已接真实接口</span></div>
              <div class="timeline-item"><strong>库存与业务</strong><span>采购、销售、生产、盘点、库存流水已接真实接口</span></div>
              <div class="timeline-item"><strong>质量 / MRP / 报表</strong><span>质量检验、MRP 建议、库存报表已接真实接口</span></div>
            </div>
          </div>
        </div>
      `;
    }

      return `
        ${renderTraceSummary('序列号快照', [
          ['序列号', serial.serial_number],
          ['物料', `${displayValue(serial.material_id)} ${displayValue(serial.material_name)}`],
          ['批次', serial.batch_number],
          ['状态', serial.current_status],
          ['货位', serial.current_bin],
          ['质量状态', serial.quality_status]
        ])}
        <div class="split">
          ${renderTraceTable('序列号流转', 'serialTraceHistory', [
            ['时间','changed_at', shortDate], ['原状态','old_status'], ['新状态','new_status'], ['原货位','old_bin'], ['新货位','new_bin'], ['原质量','old_quality_status'], ['新质量','new_quality_status'], ['事务号','transaction_id']
          ], data.serial_history || [])}
          ${renderTraceTable('库存流转', 'serialTraceMovements', [
            ['事务号','transaction_id'], ['时间','transaction_date', shortDate], ['移动类型','movement_type'], ['物料','material_id'], ['数量','quantity'], ['来源','from_bin'], ['目标','to_bin'], ['批次','batch_number']
          ], data.inventory_movements || [])}
        </div>
        <div class="split">
          ${renderTraceTable('质量检验', 'serialTraceInspections', [
            ['检验批','inspection_lot_id'], ['类型','inspection_type'], ['状态','lot_status'], ['检验时间','inspection_date', shortDate], ['检验员','inspector']
          ], data.inspection_lots || [])}
          ${renderTraceTable('质量通知', 'serialTraceNotifications', [
            ['通知单','notification_id'], ['问题描述','problem_description'], ['缺陷','defect_code'], ['严重度','severity'], ['状态','status'], ['负责人','responsible_person'], ['创建时间','created_at', shortDate]
          ], data.quality_notifications || [])}
        </div>
        ${data.batch_context ? renderBatchTraceResult(data.batch_context, '绑定批次') : ''}
      `;
    }

    async function runTrace(type) {
      const value = document.getElementById('traceValue').value.trim();
      if (!value) return showToast('请输入追溯对象');
      const target = document.getElementById('traceResult');
      target.innerHTML = '<div class="empty">追溯查询中...</div>';
      try {
        const endpoint = type === 'batch'
          ? `/api/traceability/batches/${encodedId(value)}`
          : `/api/traceability/serials/${encodedId(value)}`;
        const data = await apiData(endpoint);
        target.innerHTML = type === 'batch' ? renderBatchTraceResult(data) : renderSerialTraceResult(data);
      } catch (error) {
        target.innerHTML = `<div class="empty">追溯失败：${html(errorMessage(error))}</div>`;
      }
    }

    async function renderAuditPage() {
      const state = pageState.audit || { page: 1, keyword: '' };
      pageState.audit = state;
      const params = { page: state.page || 1, page_size: DEFAULT_PAGE_SIZE };
      if (state.keyword) params.keyword = state.keyword;
      if (state.category) params.category = state.category;
      if (state.module) params.module = state.module;
      let data;
      try {
        data = normalizeItems(await apiData(`/api/system/audit-logs${queryString(params)}`, { ignoreForbidden: true }));
      } catch (error) {
        return renderAuditUnavailable(error);
      }
      state.items = data.items;

      const config = {
        columns: [
          ['时间', 'created_at', shortDate],
          ['用户', record => record.username || record.user_id || 'SYSTEM'],
          ['分类', 'category', badge],
          ['模块', 'module', badge],
          ['动作', 'action', badge],
          ['对象', record => [record.table_name, record.record_id].filter(Boolean).join(' / ') || '-'],
          ['IP', 'ip_address'],
          ['变更', record => auditChangeSummary(record)]
        ],
        noRecordActions: true
      };

      return `
        <div class="toolbar">
          <div class="toolbar-left">
            <input id="auditSearch" placeholder="搜索用户 / 动作 / 表 / 对象 / IP" value="${html(state.keyword || '')}" onkeydown="if(event.key==='Enter') searchPage('audit')" />
            <select id="auditCategory" onchange="filterAuditPage()">
              <option value="">全部类型</option>
              ${[
                ['LOGIN', '登录'],
                ['DATA_CHANGE', '关键数据变更'],
                ['POSTING', '过账'],
                ['QUALITY', '质量判定'],
                ['SYSTEM', '系统']
              ].map(([value, label]) => `<option value="${value}" ${state.category === value ? 'selected' : ''}>${label}</option>`).join('')}
            </select>
            <select id="auditModule" onchange="filterAuditPage()">
              <option value="">全部模块</option>
              ${['auth', 'master-data', 'inventory', 'quality', 'purchase', 'sales', 'production', 'system']
                .map(value => `<option value="${value}" ${state.module === value ? 'selected' : ''}>${value}</option>`).join('')}
            </select>
            <button class="btn ghost" type="button" onclick="searchPage('audit')">搜索</button>
          </div>
          <div class="toolbar-right"><button class="btn ghost" type="button" onclick="refreshPage()">刷新</button></div>
        </div>
        ${data.items.length ? renderRecordTable('audit', config, data.items) : '<div class="empty">暂无真实审计记录。</div>'}
        ${renderPagination('audit', data)}
      `;
    }

    function auditChangeSummary(record) {
      if (record.old_data && record.new_data) return '前后变更';
      if (record.old_data) return '删除/旧值';
      if (record.new_data) {
        const data = typeof record.new_data === 'string' ? record.new_data : JSON.stringify(record.new_data);
        return data.length > 80 ? `${data.slice(0, 80)}...` : data;
      }
      return '-';
    }

    function filterAuditPage() {
      pageState.audit = {
        ...(pageState.audit || {}),
        keyword: document.getElementById('auditSearch')?.value || '',
        category: selectedValue('auditCategory'),
        module: selectedValue('auditModule'),
        page: 1
      };
      renderPage('audit');
    }

    function renderAuditUnavailable(error) {
      const status = Number(error?.status || 0);
      let message = errorMessage(error);
      if (status === 403) {
        message = '当前账号没有 audit:read 权限。请使用管理员或审计员账号重新登录，并确认 0003 审计权限迁移已执行。';
      } else if (status === 404) {
        message = '审计日志接口未加载。请重启 API 服务，确认当前后端已包含 /api/system/audit-logs 路由。';
      } else if (status >= 500) {
        message = `审计日志接口返回服务端错误：${message}。请确认数据库迁移已执行，且 sys.sys_audit_log 表存在。`;
      }

      return `
        <div class="toolbar">
          <div class="toolbar-left">
            <input id="auditSearch" placeholder="搜索用户 / 动作 / 表 / 对象 / IP" value="" disabled />
          </div>
          <div class="toolbar-right"><button class="btn ghost" type="button" onclick="refreshPage()">刷新</button></div>
        </div>
        <div class="empty">${html(message)}</div>
      `;
    }

    async function renderSystemPage(page) {
      if (page === 'audit') return renderAuditPage();
      return '<div class="empty">页面建设中</div>';
    }

    async function renderPage(page) {
      const sequence = ++renderSequence;
      currentPage = page;
      if (pageMeta[page]) {
        document.getElementById('pageTitle').textContent = pageMeta[page][0];
        document.getElementById('pageDesc').textContent = pageMeta[page][1];
      }
      document.querySelectorAll('.nav-item').forEach(item => item.classList.toggle('active', item.dataset.page === page));
      const content = document.getElementById('content');
      content.innerHTML = '<div class="empty">加载中...</div>';
      try {
        let nextHtml = '';
        if (page === 'dashboard') nextHtml = await renderDashboard();
        else if (page === 'mrpRun') nextHtml = await renderMrpRunPage();
        else if (page === 'batchTrace') nextHtml = renderTracePage('batch');
        else if (page === 'serialTrace') nextHtml = renderTracePage('serial');
        else if (page === 'audit') nextHtml = await renderSystemPage(page);
        else if (pageConfigs[page]) nextHtml = await renderResourcePage(page);
        else nextHtml = '<div class="empty">当前页面尚未配置真实接口。</div>';
        if (sequence !== renderSequence) return;

        if (['inventoryReports', 'lowStock', 'consistency'].includes(page)) {
          nextHtml = nextHtml.replace(
            '<button class="btn ghost" type="button" onclick="refreshPage()">刷新</button>',
            '<button class="btn ghost" type="button" onclick="refreshReports()">刷新物化视图</button><button class="btn ghost" type="button" onclick="refreshPage()">刷新</button>'
          );
        }
        content.innerHTML = nextHtml;
      } catch (error) {
        if (sequence !== renderSequence) return;
        content.innerHTML = `<div class="empty">加载失败：${html(errorMessage(error))}</div>`;
      }
    }

    document.querySelectorAll('.nav-item').forEach(item => {
      item.addEventListener('click', () => {
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        item.classList.add('active');
        renderPage(item.dataset.page);
      });
    });

    // ==================== 初始化 ====================
    // 检查是否已登录
    if (authToken) {
      const storedUser = localStorage.getItem('currentUser');
      if (storedUser) {
        try {
          currentUser = JSON.parse(storedUser);
          showMainApp();
        } catch (e) {
          console.error('Failed to parse stored user:', e);
          logout();
        }
      } else {
        logout();
      }
    } else {
      showLoginPage();
    }
  </script>
</body>
</html>
